spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/aipo
    username: postgres
    password: 5480
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html